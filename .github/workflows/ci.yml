name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libcairo2-dev \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libjpeg-dev \
            libgtk-3-dev \
            libpango1.0-dev \
            libgif-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config \
            librsvg2-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        run: rustup toolchain install stable --profile minimal

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Test
        run: pnpm run test

      - name: Build sidecar
        run: pnpm --filter @loupedeck-linux/sidecar run build

      - name: Build frontend
        run: pnpm --filter @loupedeck-linux/frontend run build

      - name: Check Tauri shell
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml --locked
