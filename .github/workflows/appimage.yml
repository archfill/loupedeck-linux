name: AppImage

on:
  pull_request:
    paths:
      - .github/workflows/appimage.yml
      - apps/desktop/**
      - nix/copy-sidecar-node-modules.mjs
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - scripts/prepare-appimage-resources.mjs
  push:
    branches:
      - main
    paths:
      - .github/workflows/appimage.yml
      - apps/desktop/**
      - nix/copy-sidecar-node-modules.mjs
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - scripts/prepare-appimage-resources.mjs
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: appimage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  appimage:
    name: Build AppImage
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show initial disk usage
        run: df -h

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/share/dotnet
          df -h

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            file \
            fuse \
            libcairo2-dev \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libgif-dev \
            libgtk-3-dev \
            libjpeg-dev \
            libpango1.0-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        run: rustup toolchain install stable --profile minimal

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: pnpm run build:appimage

      - name: List AppImage artifacts
        run: find apps/desktop/src-tauri/target/release/bundle/appimage -maxdepth 1 -type f -name '*.AppImage' -print -exec ls -lh {} \;

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: loupedeck-linux-appimage
          path: apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Show final disk usage
        if: always()
        run: df -h
