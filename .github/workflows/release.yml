name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  appimage:
    name: Release AppImage
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify tag version
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version)")"
          test "$tag_version" = "$package_version"

      - name: Show initial disk usage
        run: df -h

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/share/dotnet
          df -h

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            file \
            fuse \
            libcairo2-dev \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libgif-dev \
            libgtk-3-dev \
            libjpeg-dev \
            libpango1.0-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        run: rustup toolchain install stable --profile minimal

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: pnpm run build:appimage

      - name: Prepare release assets
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist/release
          appimage="$(find apps/desktop/src-tauri/target/release/bundle/appimage -maxdepth 1 -type f -name '*.AppImage' -print -quit)"
          test -n "$appimage"
          cp "$appimage" "dist/release/loupedeck-linux-${version}-x86_64.AppImage"
          sha256sum "dist/release/loupedeck-linux-${version}-x86_64.AppImage" > "dist/release/loupedeck-linux-${version}-x86_64.AppImage.sha256"
          ls -lh dist/release

      - name: Generate release notes
        run: node scripts/generate-release-notes.mjs --tag "$GITHUB_REF_NAME" --output dist/RELEASE_NOTES.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/release/* --clobber
            gh release edit "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file dist/RELEASE_NOTES.md
          else
            gh release create "$GITHUB_REF_NAME" dist/release/* \
              --title "$GITHUB_REF_NAME" \
              --notes-file dist/RELEASE_NOTES.md
          fi

      - name: Show final disk usage
        if: always()
        run: df -h
