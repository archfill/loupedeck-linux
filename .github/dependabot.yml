version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      # Patch/minor updates are safe to batch
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'
      # Major updates grouped by related packages
      eslint-major:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - 'typescript-eslint'
          - 'prettier'
          - 'eslint-plugin-*'
        update-types:
          - 'major'
      vite-major:
        patterns:
          - 'vite'
          - '@vitejs/*'
        update-types:
          - 'major'
      tailwind-major:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
        update-types:
          - 'major'
      react-major:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
        update-types:
          - 'major'
    labels:
      - 'dependencies'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - 'dependencies'
      - 'ci'
